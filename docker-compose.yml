# docker-compose.yml — Everything App local development & production profiles
#
# Usage:
#   docker compose up                  # production build on :8080
#   docker compose --profile dev up    # development hot-reload on :3000
#   docker compose up --build          # force rebuild after code changes

services:
  # ---------- Production (default) ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEB_RENDERER: canvaskit
    image: everything-app:latest
    container_name: everything-app
    ports:
      - "8080:80"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ---------- Development (flutter web server with hot reload) ----------
  dev:
    image: ghcr.io/cirruslabs/flutter:3.41.6
    container_name: everything-dev
    profiles: ["dev"]
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "flutter pub get && flutter run -d web-server --web-port 3000 --web-hostname 0.0.0.0"
    environment:
      - PUB_CACHE=/app/.pub-cache
