# Build & Publish Flutter Artifacts (Multi-Platform)
#
# Builds Flutter web, Android APK, Linux, and Windows desktop apps when a
# version tag is pushed.  Attaches all build artifacts to the GitHub Release.
#
# Usage: git tag v1.1.0 && git push origin v1.1.0

name: Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build web --release --web-renderer canvaskit

      - name: Package web build
        run: |
          cd build/web
          zip -r ../../everything-web-${{ github.ref_name }}.zip .

      - uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: everything-web-${{ github.ref_name }}.zip
          retention-days: 30

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v7
        with:
          name: apk-build
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../everything-linux-x64-${{ github.ref_name }}.tar.gz .

      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: everything-linux-x64-${{ github.ref_name }}.tar.gz
          retention-days: 30

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath everything-windows-x64-${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: everything-windows-x64-${{ github.ref_name }}.zip
          retention-days: 30

  publish-release:
    name: Publish Release
    needs: [build-web, build-apk, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: web-build

      - uses: actions/download-artifact@v8
        with:
          name: apk-build
          path: apk-artifacts/

      - uses: actions/download-artifact@v8
        with:
          name: linux-build

      - uses: actions/download-artifact@v8
        with:
          name: windows-build

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            echo "body=Initial release" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git log ${PREV_TAG}..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges)
            if [ -z "$CHANGES" ]; then
              CHANGES="- Bug fixes and improvements"
            fi
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "## What's Changed" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$CHANGES" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "## Artifacts" >> $GITHUB_OUTPUT
            echo "- **Web**: Download \`everything-web-${{ github.ref_name }}.zip\`, extract, and serve with any static file server" >> $GITHUB_OUTPUT
            echo "- **Android**: Download the APK for your architecture (arm64-v8a recommended for modern devices)" >> $GITHUB_OUTPUT
            echo "- **Linux**: Download \`everything-linux-x64-${{ github.ref_name }}.tar.gz\`, extract, and run \`./everything\`" >> $GITHUB_OUTPUT
            echo "- **Windows**: Download \`everything-windows-x64-${{ github.ref_name }}.zip\`, extract, and run \`everything.exe\`" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate SHA256 checksums
        run: |
          sha256sum everything-web-${{ github.ref_name }}.zip > SHA256SUMS.txt
          for apk in apk-artifacts/*.apk; do
            sha256sum "$apk" >> SHA256SUMS.txt
          done
          sha256sum everything-linux-x64-${{ github.ref_name }}.tar.gz >> SHA256SUMS.txt
          sha256sum everything-windows-x64-${{ github.ref_name }}.zip >> SHA256SUMS.txt

      - name: Build release body
        id: body
        run: |
          {
            echo "body<<BODY_EOF"
            echo "${{ steps.changelog.outputs.body }}"
            echo ""
            echo "## SHA256 Checksums"
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.body.outputs.body }}
          files: |
            everything-web-${{ github.ref_name }}.zip
            apk-artifacts/*.apk
            everything-linux-x64-${{ github.ref_name }}.tar.gz
            everything-windows-x64-${{ github.ref_name }}.zip
            SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
